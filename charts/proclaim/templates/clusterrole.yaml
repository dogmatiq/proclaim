{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Chart.Name }}
  labels:
  {{- include "proclaim.labels" . | nindent 4 }}
rules:
- apiGroups:
  - proclaim.dogmatiq.io
  resources:
  - dnssd-service-instances
  - dnssd-service-instances/status
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
{{- end }}
